<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Merci — Le New Yorkais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#050505;color:#f5f2ec;
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:40px 24px;text-align:center;position:relative;overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(ellipse at center,transparent 30%,rgba(5,5,5,.7) 100%),
      url('./images/2.jpg') center/cover no-repeat;
    filter:contrast(1.05) saturate(1.1) brightness(.85);
  }
  .card{max-width:640px}
  .mark{
    width:88px;height:88px;border-radius:50%;background:#e11d24;
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:36px;color:#fff;font-size:38px;
    box-shadow:0 0 80px -10px #e11d24;
  }
  .eyebrow{
    display:inline-block;font-size:11px;letter-spacing:.5em;text-transform:uppercase;
    color:#c9a24a;font-weight:600;margin-bottom:24px;
  }
  h1{
    font-family:'Playfair Display',serif;font-weight:600;font-style:italic;
    font-size:clamp(48px,7vw,90px);line-height:1.05;letter-spacing:-.01em;
    margin-bottom:24px;
    text-shadow:0 4px 40px rgba(0,0,0,.6);
  }
  p{
    font-size:18px;color:rgba(245,242,236,.8);line-height:1.65;font-weight:300;
    max-width:520px;margin:0 auto 44px;
    text-shadow:0 2px 20px rgba(0,0,0,.5);
  }
  a.btn{
    display:inline-block;padding:16px 34px;background:transparent;border:1px solid rgba(245,242,236,.5);
    color:#f5f2ec;font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:700;
    text-decoration:none;transition:all .25s;
  }
  a.btn:hover{background:#f5f2ec;color:#000;border-color:#f5f2ec}
  .logo{
    position:fixed;top:32px;left:32px;
    font-family:'Playfair Display',serif;font-style:italic;font-weight:800;font-size:22px;
  }
  .logo span{color:#e11d24}
</style>
</head>
<body>
  <div class="logo">Le <em>New</em> <span>Yorkais</span></div>
  <div class="card">
    <div class="mark">✓</div>
    <div class="eyebrow">Candidature reçue</div>
    <h1>Merci pour votre confiance.</h1>
    <p>Notre direction étudie personnellement chaque dossier. Vous recevrez une réponse sous 72 heures au numéro et à l'email indiqués dans votre candidature.</p>
    <a href="./" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
